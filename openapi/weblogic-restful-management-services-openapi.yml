  /lifecycle/latest/servers/{serverName}/shutdown:
    post:
      operationId: lifecycleShutdownServer
      summary: Shut down a server via lifecycle API
      description: >-
        Shuts down the specified server using the lifecycle management
        resource set.
      tags:
        - Lifecycle
      parameters:
        - $ref: '#/components/parameters/serverName'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                timeout:
                  type: integer
                  description: Timeout in seconds for graceful shutdown
                ignoreSessions:
                  type: boolean
                  description: Whether to ignore active sessions
                waitForAllSessions:
                  type: boolean
                  description: Whether to wait for all sessions to complete
      responses:
        '200':
          description: Shutdown initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /lifecycle/latest/servers/{serverName}/start:
    post:
      operationId: lifecycleStartServer
