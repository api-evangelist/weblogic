        - Lifecycle
      parameters:
        - $ref: '#/components/parameters/serverName'
      responses:
        '200':
          description: Resume initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        WebLogic Server administrator credentials. Uses HTTP Basic
        Authentication with the WebLogic admin username and password.
  parameters:
    serverName:
      name: serverName
      in: path
      required: true
      description: The name of the WebLogic Server instance
      schema:
        type: string
    clusterName:
      name: clusterName
      in: path
      required: true
      description: The name of the WebLogic cluster
      schema:
        type: string
    dataSourceName:
      name: dataSourceName
      in: path
      required: true
      description: The name of the JDBC data source
      schema:
        type: string
    appName:
      name: appName
      in: path
      required: true
      description: The name of the deployed application
      schema:
        type: string
  responses:
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        type:
          type: string
          description: Error type URI
        title:
          type: string
          description: Short error title
        status:
          type: integer
          description: HTTP status code
        detail:
          type: string
          description: Detailed error message
        o:errorPath:
          type: string
          description: Path to the field that caused the error
    EditRoot:
      type: object
      properties:
        name:
          type: string
          description: Domain name
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
        changeManager:
          type: object
          description: Reference to the change manager resource
    ChangeManagerStatus:
      type: object
      properties:
        locked:
          type: boolean
          description: Whether the configuration is locked for editing
        lockOwner:
          type: string
          description: The user who holds the edit lock
        hasChanges:
          type: boolean
          description: Whether there are pending changes
        mergeNeeded:
          type: boolean
          description: Whether a merge is needed before activation
    ActivationStatus:
      type: object
      properties:
        status:
          type: string
          description: Status of the activation
          enum:
            - ACTIVATED
            - FAILED
            - PENDING
        activationTasks:
          type: array
          items:
            type: object
            properties:
              server:
                type: string
              state:
                type: string
              error:
                type: string
    DomainConfiguration:
      type: object
      properties:
        name:
          type: string
          description: Domain name
        adminServerName:
          type: string
          description: Name of the administration server
        domainVersion:
          type: string
          description: WebLogic Server domain version
        productionModeEnabled:
          type: boolean
          description: Whether the domain is in production mode
        configurationVersion:
          type: string
          description: Configuration version string
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
    ServerConfiguration:
      type: object
      properties:
        name:
          type: string
          description: Server name
        listenAddress:
          type: string
          description: Listen address for the server
        listenPort:
          type: integer
          description: Listen port for the server
          default: 7001
        SSLListenPort:
          type: integer
          description: SSL listen port
        cluster:
          type: string
          description: Cluster this server belongs to
        machine:
          type: string
          description: Machine this server is assigned to
        listenPortEnabled:
          type: boolean
          description: Whether the plain-text listen port is enabled
        clientCertProxyEnabled:
          type: boolean
          description: Whether client cert proxy is enabled
        startupMode:
          type: string
          description: Server startup mode
          enum:
            - RUNNING
            - STANDBY
            - ADMIN
        autoRestart:
          type: boolean
          description: Whether the server automatically restarts on failure
        restartMax:
          type: integer
          description: Maximum number of restart attempts
        javaCompiler:
          type: string
          description: Java compiler to use for JSP compilation
        stagingMode:
          type: string
          description: Application staging mode
          enum:
            - stage
            - nostage
            - external_stage
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
      required:
        - name
    ClusterConfiguration:
      type: object
      properties:
        name:
          type: string
          description: Cluster name
        clusterMessagingMode:
          type: string
          description: Messaging mode for the cluster
          enum:
            - unicast
            - multicast
        clusterBroadcastChannel:
          type: string
          description: Multicast channel for cluster communication
        clusterAddress:
          type: string
          description: >-
            Comma-separated list of address:port pairs for cluster members
        defaultLoadAlgorithm:
          type: string
          description: Load balancing algorithm
          enum:
            - round-robin
            - weight-based
            - round-robin-affinity
            - weight-based-affinity
            - random
        weblogicPluginEnabled:
          type: boolean
          description: Whether the WebLogic plugin is enabled
        frontendHost:
          type: string
          description: Frontend host for the cluster
        frontendHTTPPort:
          type: integer
          description: Frontend HTTP port
        frontendHTTPSPort:
          type: integer
          description: Frontend HTTPS port
        numberOfServersInClusterAddress:
          type: integer
          description: Number of servers in the cluster address
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
      required:
        - name
    JDBCSystemResource:
      type: object
      properties:
        name:
          type: string
          description: JDBC system resource name
        targets:
          type: array
          items:
            type: string
          description: Target servers or clusters
        descriptorFileName:
          type: string
          description: JDBC descriptor file name
        JDBCResource:
          type: object
          properties:
            name:
              type: string
            JDBCDataSourceParams:
              type: object
              properties:
                JNDINames:
                  type: array
                  items:
                    type: string
                  description: JNDI names for the data source
                globalTransactionsProtocol:
                  type: string
                  enum:
                    - TwoPhaseCommit
                    - LoggingLastResource
                    - EmulateTwoPhaseCommit
                    - OnePhaseCommit
                    - None
            JDBCDriverParams:
              type: object
              properties:
                url:
                  type: string
                  description: JDBC connection URL
                driverName:
                  type: string
                  description: JDBC driver class name
                properties:
                  type: object
                  properties:
                    items:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          value:
                            type: string
            JDBCConnectionPoolParams:
              type: object
              properties:
                initialCapacity:
                  type: integer
                  description: Initial number of connections
                maxCapacity:
                  type: integer
                  description: Maximum number of connections
                minCapacity:
                  type: integer
                  description: Minimum number of connections
                testTableName:
                  type: string
                  description: Table name used for connection testing
                testConnectionsOnReserve:
                  type: boolean
                  description: Whether to test connections when reserved
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
      required:
        - name
    JMSSystemResource:
      type: object
      properties:
        name:
          type: string
          description: JMS system resource name
        targets:
          type: array
          items:
            type: string
          description: Target servers or clusters
        descriptorFileName:
          type: string
          description: JMS descriptor file name
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
      required:
        - name
    AppDeployment:
      type: object
      properties:
        name:
          type: string
          description: Application name
        sourcePath:
          type: string
          description: Path to the application source
        targets:
          type: array
          items:
            type: string
          description: Target servers or clusters
        moduleType:
          type: string
          description: Module type (ear, war, jar, etc.)
        planPath:
          type: string
          description: Path to the deployment plan
        stagingMode:
          type: string
          description: Staging mode
          enum:
            - stage
            - nostage
            - external_stage
        securityDDModel:
          type: string
          description: Security deployment descriptor model
          enum:
            - DDOnly
            - CustomRoles
            - CustomRolesAndPolicies
            - Advanced
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
      required:
        - name
    SecurityConfiguration:
      type: object
      properties:
        name:
          type: string
        realms:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              authenticationProviders:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
        crossDomainSecurityEnabled:
          type: boolean
        webAppFilesCaseInsensitive:
          type: string
          enum:
            - os
            - 'true'
            - 'false'
    DomainRuntime:
      type: object
      properties:
        name:
          type: string
          description: Domain name
        activationTime:
          type: integer
          format: int64
          description: Domain activation time in milliseconds
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
    ServerLifecycleRuntime:
      type: object
      properties:
        name:
          type: string
          description: Server name
        state:
          type: string
          description: Current server lifecycle state
          enum:
            - SHUTDOWN
            - STARTING
            - STANDBY
            - ADMIN
            - RESUMING
            - RUNNING
            - SUSPENDING
            - FORCE_SUSPENDING
            - SHUTTING_DOWN
            - FAILED
            - UNKNOWN
        nodeManagerRestartCount:
          type: integer
          description: Number of times node manager has restarted this server
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
    ServerRuntime:
      type: object
      properties:
        name:
          type: string
          description: Server name
        state:
          type: string
          description: Current server state
        listenAddress:
          type: string
          description: Current listen address
        listenPort:
          type: integer
          description: Current listen port
        SSLListenPort:
          type: integer
          description: Current SSL listen port
        activationTime:
          type: integer
          format: int64
          description: Server activation time in milliseconds since epoch
        currentMachine:
          type: string
          description: Machine the server is running on
        weblogicVersion:
          type: string
          description: WebLogic Server version string
        openSocketsCurrentCount:
          type: integer
          description: Current number of open sockets
        healthState:
          type: object
          properties:
            state:
              type: string
              enum:
                - HEALTH_OK
                - HEALTH_WARN
                - HEALTH_CRITICAL
                - HEALTH_FAILED
                - HEALTH_OVERLOADED
            subsystemName:
              type: string
            symptoms:
              type: array
              items:
                type: string
        restartRequired:
          type: boolean
          description: Whether a server restart is required
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
    JVMRuntime:
      type: object
      properties:
        name:
          type: string
        heapSizeCurrent:
          type: integer
          format: int64
          description: Current JVM heap size in bytes
        heapSizeMax:
          type: integer
          format: int64
          description: Maximum JVM heap size in bytes
        heapFreeCurrent:
          type: integer
          format: int64
          description: Current free heap memory in bytes
        heapFreePercent:
          type: number
          format: double
          description: Percentage of heap memory that is free
        javaVersion:
          type: string
          description: Java version
        javaVendor:
          type: string
          description: Java vendor name
        osName:
          type: string
          description: Operating system name
        osVersion:
          type: string
          description: Operating system version
        uptime:
          type: integer
          format: int64
          description: JVM uptime in milliseconds
    ThreadPoolRuntime:
      type: object
      properties:
        name:
          type: string
        executeThreadTotalCount:
          type: integer
          description: Total number of execute threads
        executeThreadIdleCount:
          type: integer
          description: Number of idle execute threads
        hoggingThreadCount:
          type: integer
          description: Number of threads that are hogging resources
        stuckThreadCount:
          type: integer
          description: Number of stuck threads
        pendingUserRequestCount:
          type: integer
          description: Number of pending user requests in the queue
        throughput:
          type: number
          format: double
          description: Thread pool throughput
        completedRequestCount:
          type: integer
          format: int64
          description: Total number of completed requests
        overloadRejectedRequestsCount:
          type: integer
          format: int64
          description: Number of requests rejected due to overload
        queueLength:
          type: integer
          description: Current queue length
        sharedCapacityForWorkManagers:
          type: integer
          description: Shared capacity for work managers
        healthState:
          type: object
          properties:
            state:
              type: string
            subsystemName:
              type: string
    JDBCServiceRuntime:
      type: object
      properties:
        name:
          type: string
        JDBCDataSourceRuntimeMBeans:
          type: array
          items:
            $ref: '#/components/schemas/JDBCDataSourceRuntime'
    JDBCDataSourceRuntime:
      type: object
      properties:
        name:
          type: string
          description: Data source name
        state:
          type: string
          description: Data source state
          enum:
            - Running
            - Suspended
            - Shutdown
            - Overloaded
            - Unknown
        enabled:
          type: boolean
          description: Whether the data source is enabled
        activeConnectionsCurrentCount:
          type: integer
          description: Current number of active connections
        activeConnectionsHighCount:
          type: integer
          description: High watermark of active connections
        activeConnectionsAverageCount:
          type: integer
          description: Average number of active connections
        connectionsTotalCount:
          type: integer
          description: Total connections created
        currCapacity:
          type: integer
          description: Current capacity of the connection pool
        numAvailable:
          type: integer
          description: Number of available connections
        numUnavailable:
          type: integer
          description: Number of unavailable connections
        highestNumAvailable:
          type: integer
          description: Highest number of available connections
        highestNumUnavailable:
          type: integer
          description: Highest number of unavailable connections
        waitingForConnectionCurrentCount:
          type: integer
          description: Current number of threads waiting for a connection
        waitingForConnectionHighCount:
          type: integer
          description: High watermark of threads waiting for a connection
        waitSecondsHighCount:
          type: integer
          description: Highest wait time in seconds
        connectionDelayTime:
          type: integer
          description: Average time to create a connection in milliseconds
        failuresToReconnectCount:
          type: integer
          description: Number of failures to reconnect
        leakedConnectionCount:
          type: integer
          description: Number of leaked connections
        prepStmtCacheCurrentSize:
          type: integer
          description: Current size of the prepared statement cache
    JMSRuntime:
      type: object
      properties:
        name:
          type: string
        connectionsCurrentCount:
          type: integer
          description: Current number of JMS connections
        connectionsTotalCount:
          type: integer
          description: Total JMS connections created
        connectionsHighCount:
          type: integer
          description: High watermark of JMS connections
        JMSServersCurrentCount:
          type: integer
          description: Current number of JMS servers
        JMSServersTotalCount:
          type: integer
          description: Total JMS servers created
        JMSServersHighCount:
          type: integer
          description: High watermark of JMS servers
        healthState:
          type: object
          properties:
            state:
              type: string
            subsystemName:
              type: string
    JMSServerRuntime:
      type: object
      properties:
        name:
          type: string
          description: JMS server name
        messagesCurrentCount:
          type: integer
          format: int64
          description: Current number of messages
        messagesPendingCount:
          type: integer
          format: int64
          description: Number of pending messages
        messagesHighCount:
          type: integer
          format: int64
          description: High watermark of messages
        messagesReceivedCount:
          type: integer
          format: int64
          description: Total messages received
        bytesCurrentCount:
          type: integer
          format: int64
          description: Current total bytes of all messages
        bytesPendingCount:
          type: integer
          format: int64
          description: Bytes of pending messages
        consumersCurrentCount:
          type: integer
          format: int64
          description: Current number of consumers
        consumersHighCount:
          type: integer
          format: int64
