    resources:
    - name: deployments
      path: /deployments
      operations:
      - name: getdeployments
        method: GET
        description: Oracle WebLogic Server APIs List all application deployment metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
