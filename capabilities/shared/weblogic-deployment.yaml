naftiko: "1.0.0-alpha1"

info:
  label: "Oracle WebLogic Deployment API"
  description: >-
    RESTful API for deploying, undeploying, redeploying, and managing applications
    and shared libraries in Oracle WebLogic Server domains.
  tags:
    - Oracle
    - WebLogic
    - Deployment
    - Applications
    - Libraries
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WEBLOGIC_ADMIN_USER: WEBLOGIC_ADMIN_USER
      WEBLOGIC_ADMIN_PASSWORD: WEBLOGIC_ADMIN_PASSWORD

capability:
  consumes:
    - type: http
      namespace: weblogic-deployment
      baseUri: https://{host}:7001/management/weblogic/latest/edit/appDeployments
      description: "WebLogic Server Deployment Management API"
      authentication:
        type: basic
        username: "{{WEBLOGIC_ADMIN_USER}}"
        password: "{{WEBLOGIC_ADMIN_PASSWORD}}"
      resources:
        - name: applications
          path: /deployments
          description: "Application deployment management"
          operations:
            - name: list-deployments
              method: GET
              description: "List all application deployments"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-deployment
              method: POST
              description: "Create an application deployment"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  sourcePath: "{{tools.sourcePath}}"
                  targets: "{{tools.targets}}"

            - name: get-deployment
              method: GET
              description: "Get an application deployment"
              inputParameters:
                - name: deploymentName
                  in: path
                  type: string
                  required: true
                  description: "Deployment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-deployment
              method: POST
              description: "Update an application deployment"
              inputParameters:
                - name: deploymentName
                  in: path
                  type: string
                  required: true
                  description: "Deployment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-deployment
              method: DELETE
              description: "Remove an application deployment"
              inputParameters:
                - name: deploymentName
                  in: path
                  type: string
                  required: true
                  description: "Deployment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: deploy
              method: POST
              description: "Deploy an application at runtime"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: undeploy
              method: POST
              description: "Undeploy an application at runtime"
              inputParameters:
                - name: deploymentName
                  in: path
                  type: string
                  required: true
                  description: "Deployment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: redeploy
              method: POST
              description: "Redeploy an application"
              inputParameters:
                - name: deploymentName
                  in: path
                  type: string
                  required: true
                  description: "Deployment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: start-application
              method: POST
              description: "Start a deployed application"
              inputParameters:
                - name: deploymentName
                  in: path
                  type: string
                  required: true
                  description: "Deployment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: stop-application
              method: POST
              description: "Stop a deployed application"
              inputParameters:
                - name: deploymentName
                  in: path
                  type: string
                  required: true
                  description: "Deployment name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: libraries
          path: /libraries
          description: "Shared library deployment management"
          operations:
            - name: list-libraries
              method: GET
              description: "List all shared library deployments"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-library
              method: POST
              description: "Create a shared library deployment"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-library
              method: DELETE
              description: "Remove a shared library deployment"
              inputParameters:
                - name: libraryName
                  in: path
                  type: string
                  required: true
                  description: "Library name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: weblogic-deployment-api
      resources:
        - path: /v1/deployments
          name: deployments
          operations:
            - method: GET
              name: list-deployments
              description: "List all application deployments"
              call: "weblogic-deployment.list-deployments"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: deploy
              description: "Deploy an application"
              call: "weblogic-deployment.deploy"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: weblogic-deployment-mcp
      transport: http
      tools:
        - name: list-deployments
          description: "List all WebLogic application deployments"
          hints:
            readOnly: true
          call: "weblogic-deployment.list-deployments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: deploy-application
          description: "Deploy an application to WebLogic"
          hints:
            readOnly: false
          call: "weblogic-deployment.deploy"
          outputParameters:
            - type: object
              mapping: "$."
        - name: undeploy-application
          description: "Undeploy an application from WebLogic"
          hints:
            destructive: true
          call: "weblogic-deployment.undeploy"
          with:
            deploymentName: "tools.deploymentName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: redeploy-application
          description: "Redeploy an application on WebLogic"
          hints:
            readOnly: false
          call: "weblogic-deployment.redeploy"
          with:
            deploymentName: "tools.deploymentName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: start-application
          description: "Start a deployed WebLogic application"
          hints:
            readOnly: false
          call: "weblogic-deployment.start-application"
          with:
            deploymentName: "tools.deploymentName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stop-application
          description: "Stop a deployed WebLogic application"
          hints:
            destructive: false
          call: "weblogic-deployment.stop-application"
          with:
            deploymentName: "tools.deploymentName"
          outputParameters:
            - type: object
              mapping: "$."
