    port: 9090
    transport: http
    description: MCP adapter for Oracle WebLogic Server APIs Oracle WebLogic Server Monitoring and Diagnostics API — JMS.
      One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: oracle-weblogic-server-apis-list
      description: Oracle WebLogic Server APIs List all JMS server metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: monitoring-diagnostics-jms.getjmsservers
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-apis-get
      description: Oracle WebLogic Server APIs Get JMS server metrics
      hints:
        readOnly: true
