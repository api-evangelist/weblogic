description: Oracle WebLogic Server is a Java EE application server distributed under Oracle commercial
  license. The "APIs" exposed (JMX, RESTful management, JAX-RS / JAX-WS hosting) ship with the product
  and run inside the customer's deployment; there is no public, self-serve API plan or per-call pricing.
  Pricing is licensed per OCPU / processor / Named User Plus through Oracle's standard price list.
notes: oracle.com pricing pages returned 403 to automated fetch. Acquisition is via Oracle technology
  price list and Oracle sales; no self-serve developer plans exist. Scaffold reduced to one Contact
  Sales plan.
sources:
  - https://www.oracle.com/java/weblogic/
