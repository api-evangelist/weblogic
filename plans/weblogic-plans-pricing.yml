  - id: weblogic-contact-sales
    name: Contact Sales
    type: enterprise
    description: Oracle WebLogic Server license + support, sized per processor / OCPU / Named User Plus
      and negotiated through Oracle sales. Includes the management / REST APIs that ship with WebLogic.
    entries:
