provider: Oracle WebLogic Server APIs
providerId: weblogic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Application Server
  - Enterprise
  - Java EE
  - Middleware
  - Rate Limiting
  - Contact Sales
description: Oracle WebLogic Server runs inside the customer's data center / OCI tenancy; the management,
  JMX, and REST APIs it exposes are not subject to a centrally published rate-limit policy. Throughput,
  concurrency, work-manager constraints, and throttling are all configured by the deploying organization
  via WebLogic's tuning surface.
notes: oracle.com 403 on automated fetch. Limits are deployment-tunable, not provider-published.
sources:
  - https://www.oracle.com/java/weblogic/
responseCodes: {}
limits:
  - name: Deployment-Tuned Throughput
    scope: deployment
    metric: varies
    limit: configured per WebLogic domain / work-manager
policies:
  - name: Self-Tuned Limits
    description: WebLogic exposes work managers, max-threads-constraint, capacity, and request classes
      that the operator configures. There is no public per-call quota imposed by Oracle on customer
      deployments.
