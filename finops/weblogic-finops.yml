meters:
  - name: weblogic_license
    description: Oracle WebLogic Server license entitlement, sized per processor / OCPU / Named User
      Plus per Oracle Technology Price List.
    unit: varies
    aggregation: sum
  - name: weblogic_support
    description: Oracle technical support and updates renewal on the WebLogic license.
    unit: month
    aggregation: sum
principles:
  - name: Visibility
    description: Spend visibility comes from Oracle order documents and the customer's License
      Management Service (LMS) records, not a public usage API.
  - name: Allocation
    description: Allocate WebLogic spend by domain, business unit, or hosted application using internal
      CMDB / cost-center tags on the licensed processors and managed servers.
  - name: Optimization
    description: Cost levers are processor-count consolidation, soft-partitioning where Oracle-approved,
      Named-User-Plus modeling, and renegotiation of ULAs at renewal.
  - name: Accountability
    description: Middleware platform owners and Oracle license-management leads coordinate renewals
      and true-ups with Oracle account management.
